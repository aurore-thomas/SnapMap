<ion-header>
  <ion-toolbar>
    <ion-title>{{ photos.length }} photos ici</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-grid>
    <ion-row>
      <ion-col
        size="4"
        *ngFor="let photo of photos; let i = index"
        (click)="openPhotoDetail(i)"
        class="cluster-photo-col">
        <img [src]="photo.webviewPath" alt="Photo" class="cluster-thumb" />
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
